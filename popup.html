<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redmine Plus</title>
  <link rel="stylesheet" href="css/pico.min.css">
  <style>
    body {
      min-width: 300px;
      padding: 20px;
    }
    .popup-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #e040fb;
    }
    .open-options-btn {
      width: 100%;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      transition: background 0.3s;
    }
    .open-options-btn:hover {
      background: #1976D2;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="logo">Redmine Plus</div>
    <button id="openOptionsBtn" class="open-options-btn">打开设置</button>
  </div>
  <script src="js/popup.js"></script>
</body>
</html>
